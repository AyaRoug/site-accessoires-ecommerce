<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zina - Bracelets</title>

  <!-- Google Fonts - doit être AVANT le style -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <style>

  /* ============================================
     HEADER - barre de navigation principale
     contient le logo à gauche et le menu à droite
  ============================================ */

  header {
    background-color: #F5F0E8; /* couleur beige crème inspirée du moodboard */
    display: flex;              /* met les éléments en ligne (logo + nav) */
    justify-content: space-between; /* logo à gauche, nav à droite */
    align-items: center;        /* centre verticalement logo et nav */
    padding: 20px 60px;         /* espace intérieur : 20px haut/bas, 60px gauche/droite */
    gap: 60px;                  /* espace entre le logo et le nav */
  }

  /* ============================================
     LOGO - le nom "Zina" affiché à gauche
  ============================================ */

  .logo h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 36px;
  letter-spacing: 5px;
}

  /* ============================================
     NAV - conteneur des liens de navigation
  ============================================ */

  nav ul {
    list-style: none;  /* supprime les puces de la liste */
    display: flex;     /* met les liens côte à côte (horizontal) */
    gap: 40px;         /* espace entre chaque lien */
    margin: 0;         /* supprime la marge par défaut du ul */
    padding: 0;        /* supprime le padding par défaut du ul */
  }

  /* ============================================
     LIENS - style de chaque lien du menu
  ============================================ */

  nav ul li a {
    text-decoration: none;      /* supprime le soulignement par défaut */
    color: #5C3D2E;             /* même brun que le logo */
    font-size: 14px;            /* taille du texte des liens */
    letter-spacing: 2px;        /* légèrement espacé pour un look raffiné */
    text-transform: uppercase;  /* met les lettres en majuscules */
  }

  /* ============================================
     HOVER - effet quand on passe la souris sur un lien
  ============================================ */

  nav ul li a:hover {
    color: #C4A882; /* couleur dorée/caramel au survol */
  }

  /* ============================================
     ACTIVE - style du lien de la page actuelle
     (ici la page Bracelets sera soulignée)
  ============================================ */

  nav ul li a.active {
    border-bottom: 2px solid #5C3D2E; /* ligne sous le lien actif */
  }

  /* ============================================
   HERO - section bannière en haut de la page
============================================ */

.hero {
  background-color: #F5F0E8;    /* même beige que le header */
  background-image:             /* motif arabesque répété en CSS */
    radial-gradient(circle, #C4A88233 1px, transparent 1px);
  background-size: 24px 24px;   /* taille du motif répété */
  padding: 100px 60px;          /* espace intérieur haut/bas */
  text-align: center;           /* centre tout le contenu */
  border-bottom: 1px solid #C4A882; /* ligne décorative en bas */
}

/* ============================================
   HERO - conteneur principal
============================================ */
.hero {
  display: flex;
  height: 500px;
  overflow: hidden;
  border: 8px solid #F5F0E8;
  outline: 2px solid #C4A882;
  margin: 20px 60px;
  gap: 4px;
  background-color: #C4A882;
}

/* ============================================
   IMAGES - avec animation hover
============================================ */
.hero img {
  width: 33.33%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.85);
  transition: transform 0.5s ease, filter 0.5s ease;
}

.hero img:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* ============================================
   TEXTE SUPERPOSE SUR LES IMAGES
============================================ */
.hero-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  background-color: rgba(0,0,0,0.3);
  padding: 40px 60px;
  border: 1px solid #C4A882;
  z-index: 2;
}

.hero-titre {
  font-family: 'Amiri', serif;
  font-size: 72px;
  color: #ffffff;
  letter-spacing: 8px;
  margin: 0;
}

.hero-sous-titre {
  font-size: 13px;
  color: #F5F0E8;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 0;
}

.hero-ornement {
  color: #C4A882;
  font-size: 18px;
}
/* ============================================
   CITATION - sous les images hero
============================================ */
.citation {
  display: flex;            /* met tout en ligne */
  align-items: center;      /* centre verticalement */
  justify-content: center;  /* centre horizontalement */
  gap: 16px;                /* espace entre les éléments */
  padding: 40px 60px;       /* espace autour */
  background-color: #F5F0E8; /* même beige que le header */
}

/* ============================================
   TEXTE DE LA CITATION
============================================ */
.citation-texte {
  font-family: 'Amiri', serif; /* même police que le logo */
  font-size: 22px;
  color: #5C3D2E;              /* brun noyer */
  font-style: italic;          /* italique pour l'élégance */
  letter-spacing: 2px;
  margin: 0;
}

/* ============================================
   ORNEMENTS - les ✦ décoratifs
============================================ */
.citation-ornement {
  color: #C4A882;   /* doré */
  font-size: 16px;
}

/* ============================================
   LIGNES - les —— de chaque côté
============================================ */
.citation-ligne {
  color: #C4A882;   /* doré */
  font-size: 20px;
  letter-spacing: -4px; /* resserre les tirets */
}

  </style>
</head>

<body>

  <header>
    <div class="logo">
      <h1>Zina</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="bracelets.html" class="active">Bracelets</a></li>
        <li><a href="sets.html">Sets</a></li>
        <li><a href="mdamma.html">Mdamma & Chmar</a></li>
        <li><a href="rings.html">Rings & Earrings</a></li>
      </ul>
    </nav>
  </header>

<main>

  <!-- ============================================
       HERO - bannière principale avec image
  ============================================ -->
 <!-- HERO - les 3 images côte à côte -->
<section class="hero">
  <img src="dblij1.jpg" alt="Bracelets dorés">
  <img src="Rafinity.jpg" alt="Bracelet émeraude">
  <img src="amazigh.jpg" alt="Bracelet coloré">
</section>
 <!-- ============================================
     CITATION - sous les images du hero
============================================ -->
    <div class="citation">
    <span class="citation-ligne">——</span>
    <span class="citation-ornement">✦</span>
    <p class="citation-texte">"Every piece tells a story of Moroccan heritage"</p>
    <span class="citation-ornement">✦</span>
    <span class="citation-ligne">——</span>
    </div>
</main>
  <footer>
  </footer>

</body>
</html>
